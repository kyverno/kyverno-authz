apiVersion: agentic.networking.x-k8s.io/v0alpha0
kind: XAccessPolicy
metadata:
  name: auth-policy-remote-mcp
  namespace: quickstart-ns
spec:
  targetRefs:
  - group: agentic.networking.x-k8s.io
    kind: XBackend
    name: remote-mcp-backend
  rules:
  - name: ext-authorizer-for-adk-agent-sa
    source:
      type: ServiceAccount
      serviceAccount:
        name: adk-agent-sa
        namespace: quickstart-ns
    authorization:
      type: ExternalAuth
      externalAuth:
        protocol: GRPC
        grpc: {}
        backendRef:
          group: ""
          kind: Service
          name: kyverno-authz-server
          namespace: kyverno
          port: 9081
